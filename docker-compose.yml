services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./api
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: celery -A worker worker --loglevel=info --concurrency=4
